name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10

jobs:
  build-linux-amd64:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install release smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl tmux

      - name: Build release binaries
        run: cargo build --release --bin swimmers --bin swimmers-tui

      - name: Smoke native packaged assets
        run: ./scripts/release-acceptance-smoke.sh native-assets

      - name: Smoke default release binaries
        run: ./scripts/release-acceptance-smoke.sh default-installed
        env:
          SWIMMERS_ACCEPTANCE_BIN_DIR: ${{ github.workspace }}/target/release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/swimmers dist/swimmers-linux-amd64
          cp target/release/swimmers-tui dist/swimmers-tui-linux-amd64
          chmod +x dist/swimmers-linux-amd64 dist/swimmers-tui-linux-amd64
          cd dist
          sha256sum swimmers-linux-amd64 > swimmers-linux-amd64.sha256
          sha256sum swimmers-tui-linux-amd64 > swimmers-tui-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: swimmers-linux-amd64-binaries
          path: dist/*

  build-darwin-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release smoke dependencies
        run: brew install tmux

      - name: Build release binaries
        run: cargo build --release --bin swimmers --bin swimmers-tui

      - name: Smoke native packaged assets
        run: ./scripts/release-acceptance-smoke.sh native-assets

      - name: Smoke default release binaries
        run: ./scripts/release-acceptance-smoke.sh default-installed
        env:
          SWIMMERS_ACCEPTANCE_BIN_DIR: ${{ github.workspace }}/target/release

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/swimmers dist/swimmers-darwin-arm64
          cp target/release/swimmers-tui dist/swimmers-tui-darwin-arm64
          chmod +x dist/swimmers-darwin-arm64 dist/swimmers-tui-darwin-arm64
          cd dist
          shasum -a 256 swimmers-darwin-arm64 > swimmers-darwin-arm64.sha256
          shasum -a 256 swimmers-tui-darwin-arm64 > swimmers-tui-darwin-arm64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: swimmers-darwin-arm64-binaries
          path: dist/*

  release:
    name: Create Release
    needs: [build-linux-amd64, build-darwin-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render release notes from CHANGELOG.md
        run: ./scripts/release-notes-from-changelog.sh "$RELEASE_VERSION" > release-notes.md
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          body_path: release-notes.md
          files: dist/*
