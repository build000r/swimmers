name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  perf-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run lifecycle performance gates
        run: bash ./scripts/ci-perf-gates.sh
