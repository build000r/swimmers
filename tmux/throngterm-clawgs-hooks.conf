# throngterm hook-only tmux notify snippet
# Source manually from your tmux config or an interactive tmux shell:
#   source-file "/absolute/path/to/throngterm/tmux/throngterm-clawgs-hooks.conf"
# throngterm owns the `clawgs tmux-emit` daemon lifecycle, so this file only
# sends notify events to the shared socket.

set-hook -g session-created 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event session-created"'
set-hook -g session-closed 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event session-closed"'
set-hook -g pane-exited 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event pane-exited"'
set-hook -g pane-died 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event pane-died"'
set-hook -g after-new-window 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event after-new-window"'
set-hook -g after-split-window 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event after-split-window"'
set-hook -g client-session-changed 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event client-session-changed"'
set-hook -g window-linked 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event window-linked"'
set-hook -g window-unlinked 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event window-unlinked"'
