# throngterm hook-only tmux notify snippet
# Source manually from your tmux config or an interactive tmux shell:
#   source-file "/absolute/path/to/throngterm/tmux/throngterm-clawgs-hooks.conf"
# throngterm owns the `clawgs tmux-emit` daemon lifecycle, so this file only
# sends notify events plus tmux scope hints to the shared socket.

set-hook -g session-created 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event session-created --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g session-closed 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event session-closed --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g pane-exited 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event pane-exited --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g pane-died 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event pane-died --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g after-new-window 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event after-new-window --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g after-split-window 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event after-split-window --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g client-session-changed 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event client-session-changed --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
set-hook -g window-linked 'run-shell "clawgs tmux-notify --socket $HOME/.tmux/clawgs-tmux.sock --event window-linked --session-name \"#{session_name}\" --window-id \"#{window_id}\" --pane-id \"#{pane_id}\""'
