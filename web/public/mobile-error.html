<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throngterm Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #2f3a50, #111827 55%, #05070d);
        color: #f3f4f6;
      }

      .card {
        width: min(92vw, 420px);
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 1.2rem;
      }

      p {
        margin: 0 0 10px 0;
        line-height: 1.45;
        color: #d1d5db;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #2563eb;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
      }

      code {
        display: block;
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.25);
        font-size: 0.8rem;
        color: #cbd5e1;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Cannot Reach Throngterm Host</h1>
      <p>
        Verify your phone is connected to Tailscale and your host is running.
      </p>
      <p>
        Pull down to retry, or tap <strong>Open in Safari</strong> in the top-right.
      </p>
      <button type="button" id="retry">Retry</button>
      <code>Expected host: THRONGTERM_IOS_SERVER_URL</code>
    </main>
    <script>
      const retryBtn = document.getElementById("retry");
      retryBtn?.addEventListener("click", () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
